name: 🛠️ Setup
description: Checkout the repository, set up Deno, optionally set up Node.js, and install dependencies.
inputs:
  node:
    description: Whether to also set up Node.js
    required: false
    default: 'false'
runs:
  using: composite
  steps:
    - name: 🦕 Setup Deno
      uses: denoland/setup-deno@v2
      with:
        deno-version: v2.x
        cache: true

    - name: 🟢 Setup Node.js
      if: inputs.node == 'true'
      uses: actions/setup-node@v6
      with:
        node-version: lts/*
        registry-url: 'https://registry.npmjs.org'

    - name: 📥 Install dependencies
      shell: bash
      run: deno install
